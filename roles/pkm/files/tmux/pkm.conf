bind-key P display-popup -w 90% -h 80% -E ~/.local/bin/init-selector

bind-key q run-shell "tmux display-popup -w 90% -h 80%  -E ~/.local/bin/dv -s ~/share/_tmp/personal-calendar.json ~/share/_tmp/progress.json ~/share/_tmp/focus-notes.json ~/share/_tmp/focus-tasks.json ~/share/_tmp/focus.json ~/share/_tmp/waiting.json"
bind-key w run-shell "tmux display-popup -w 90% -h 80%  -E ~/.local/bin/dv -s ~/share/_tmp/current-videos.json ~/share/_tmp/initiatives.json ~/share/_tmp/current-tasks.json  ~/share/_tmp/current-projects.json ~/share/_tmp/current-wonders.json ~/share/_tmp/current-images.json"
bind-key e run-shell "tmux display-popup -w 90% -h 80%  -E ~/.local/bin/dv -s ~/share/_tmp/recent_achievements.json ~/share/_tmp/recent.json ~/share/_tmp/recent-inbox.json ~/share/_tmp/personal-tasks.json ~/share/_tmp/inbox-videos.json ~/share/_tmp/recent-notes.json ~/share/_tmp/starred-videos.json"

- name: Install Hyprland packages on Arch
  become: true
  community.general.pacman:
    name: "{{ hyprland_arch_packages }}"
    state: present

- name: Ensure Hyprland config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ xdg_config_home }}/hypr"
    - "{{ xdg_config_home }}/hypr/conf.d"
    - "{{ xdg_config_home }}/hypr/hyprlock.d"
    - "{{ xdg_config_home }}/hypr/hypridle.d"
    - "{{ xdg_config_home }}/waybar"
    - "{{ xdg_config_home }}/swaync"

- name: Install Hyprland configuration trees
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: preserve
  loop:
    - src: hypr/
      dest: "{{ xdg_config_home }}/hypr/"
    - src: waybar/
      dest: "{{ xdg_config_home }}/waybar/"
    - src: swaync/
      dest: "{{ xdg_config_home }}/swaync/"

- name: Install Hyprland browser include
  ansible.builtin.template:
    src: browser.conf.j2
    dest: "{{ xdg_config_home }}/hypr/conf.d/10-browser.conf"
    mode: "0644"

- name: Install Hyprland helper scripts
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ local_bin_dir }}/{{ item.dest }}"
    mode: "0755"
  loop:
    - src: bin/way-unlock
      dest: way-unlock
    - src: bin/video-selection.sh
      dest: video-selection.sh

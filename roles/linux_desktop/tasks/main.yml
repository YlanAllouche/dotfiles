- name: Install Linux desktop packages on Arch
  become: true
  community.general.pacman:
    name: "{{ linux_desktop_arch_packages }}"
    state: present
  when: is_archlinux | bool

- name: Install Linux desktop font packages on Arch
  become: true
  community.general.pacman:
    name: "{{ linux_desktop_arch_font_packages }}"
    state: present
  when: is_archlinux | bool

- name: Install Linux desktop packages on macOS
  community.general.homebrew:
    name: "{{ linux_desktop_homebrew_packages }}"
    state: present
  when: is_macos | bool

- name: Ensure Homebrew font tap exists on macOS
  community.general.homebrew_tap:
    name: homebrew/cask-fonts
    state: present
  when: is_macos | bool

- name: Install Linux desktop font casks on macOS
  community.general.homebrew_cask:
    name: "{{ linux_desktop_homebrew_font_casks }}"
    install_options: "{{ homebrew_cask_install_options }}"
    state: present
  when: is_macos | bool

- name: Install Linux desktop AUR packages through yay
  become: true
  become_user: "{{ aur_builder_user }}"
  kewlfft.aur.aur:
    use: yay
    name: "{{ linux_desktop_aur_packages }}"
    state: present
  when:
    - is_archlinux | bool
    - aur_install_method == 'yay'

- name: Install Linux desktop AUR packages through pacman
  become: true
  community.general.pacman:
    name: "{{ linux_desktop_aur_packages }}"
    state: present
  when:
    - is_archlinux | bool
    - aur_install_method == 'pacman'

- name: Ensure Linux desktop config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ xdg_config_home }}/kitty"
    - "{{ xdg_config_home }}/kitty/conf.d"
    - "{{ xdg_config_home }}/pacmixer"
    - "{{ xdg_config_home }}/wofi"
    - "{{ xdg_config_home }}/zathura"
    - "{{ active_home }}/share"
    - "{{ active_home }}/workspaces"
    - "{{ active_home }}/workspaces/local"
    - "{{ active_home }}/workspaces/local/desktop"
    - "{{ xdg_data_home }}/generate_image"

- name: Install Linux desktop configuration trees
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: preserve
  loop:
    - src: kitty/
      dest: "{{ xdg_config_home }}/kitty/"
    - src: pacmixer/
      dest: "{{ xdg_config_home }}/pacmixer/"
    - src: wofi/
      dest: "{{ xdg_config_home }}/wofi/"

- name: Install Kitty configuration
  ansible.builtin.template:
    src: kitty.conf.j2
    dest: "{{ xdg_config_home }}/kitty/kitty.conf"
    mode: "0644"

- name: Install Zathura configuration
  ansible.builtin.template:
    src: zathurarc.j2
    dest: "{{ xdg_config_home }}/zathura/zathurarc"
    mode: "0644"

- name: Check Desktop and Downloads directories before replacing them with symlinks
  ansible.builtin.find:
    paths: "{{ item }}"
    recurse: false
    hidden: true
    file_type: any
  loop:
    - "{{ active_home }}/Desktop"
    - "{{ active_home }}/Downloads"
  register: linux_desktop_user_dirs
  failed_when: false

- name: Assert Desktop and Downloads are empty before symlinking
  ansible.builtin.assert:
    that:
      - item.matched | default(0) == 0
    fail_msg: >-
      NOTES: {{ item.item }} must be empty before this role replaces it with a symlink.
  loop: "{{ linux_desktop_user_dirs.results }}"
  when:
    - item.failed is not defined or not item.failed

- name: Remove Desktop and Downloads directories before symlinking
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ active_home }}/Desktop"
    - "{{ active_home }}/Downloads"

- name: Symlink Desktop and Downloads to workspaces local desktop
  ansible.builtin.file:
    src: "{{ active_home }}/workspaces/local/desktop"
    dest: "{{ item }}"
    state: link
  loop:
    - "{{ active_home }}/Desktop"
    - "{{ active_home }}/Downloads"

- name: Install Linux desktop helper scripts
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ local_bin_dir }}/{{ item.dest }}"
    mode: "0755"
  loop:
    - src: bin/img-clip.sh
      dest: img-clip.sh
    - src: bin/ocr-ss.sh
      dest: ocr-ss.sh
    - src: bin/rec
      dest: rec
    - src: bin/record
      dest: record

- name: Install generate_image upstream repository
  ansible.builtin.git:
    repo: "{{ linux_desktop_generate_image_repo }}"
    dest: "{{ xdg_data_home }}/generate_image"
    version: main

- name: Link generate_image entrypoint from upstream checkout
  ansible.builtin.file:
    src: "{{ xdg_data_home }}/generate_image/generate_image"
    dest: "{{ local_bin_dir }}/generate_image"
    state: link

- name: Install PIM packages on Arch
  become: true
  community.general.pacman:
    name: "{{ pim_arch_packages }}"
    state: present
  when: is_archlinux | bool

- name: Install PIM AUR packages through yay
  become: true
  become_user: "{{ aur_builder_user }}"
  kewlfft.aur.aur:
    use: yay
    name: "{{ pim_aur_packages }}"
    state: present
  when:
    - is_archlinux | bool
    - aur_install_method == 'yay'

- name: Install PIM AUR packages through pacman
  become: true
  community.general.pacman:
    name: "{{ pim_aur_packages }}"
    state: present
  when:
    - is_archlinux | bool
    - aur_install_method == 'pacman'

- name: Ensure PIM directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ xdg_config_home }}/khal"
      mode: "0755"
    - path: "{{ active_home }}/.vdirsyncer"
      mode: "0700"
    - path: "{{ active_home }}/.mutt"
      mode: "0700"

- name: Install PIM config skeletons
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "{{ item.mode }}"
  loop:
    - src: khal-config.j2
      dest: "{{ xdg_config_home }}/khal/config"
      mode: "0644"
    - src: vdirsyncer-config.j2
      dest: "{{ active_home }}/.vdirsyncer/config"
      mode: "0600"
    - src: gmailieer.json.j2
      dest: "{{ active_home }}/.gmailieer.json"
      mode: "0600"
    - src: muttrc.j2
      dest: "{{ active_home }}/.mutt/muttrc"
      mode: "0644"
    - src: mailcap.j2
      dest: "{{ active_home }}/.mailcap"
      mode: "0644"
    - src: urlview.j2
      dest: "{{ active_home }}/.urlview"
      mode: "0644"
    - src: accounts-muttrc.j2
      dest: "{{ active_home }}/.accounts.muttrc"
      mode: "0600"

- name: Apply dotfiles core
  hosts: all
  gather_facts: true

  pre_tasks:
    - name: Normalize runtime user and platform variables
      ansible.builtin.set_fact:
        active_user: "{{ dotfiles_active_user | default(ansible_user_id) }}"
        active_home: >-
          {{
            dotfiles_active_home
            | default(
              lookup('env', 'HOME')
              if inventory_hostname == 'localhost'
              else (
                '/Users/' ~ (dotfiles_active_user | default(ansible_user_id))
                if ansible_system == 'Darwin'
                else '/home/' ~ (dotfiles_active_user | default(ansible_user_id))
              )
            )
          }}
        platform_family: "{{ 'macos' if ansible_system == 'Darwin' else 'linux' }}"
        is_macos: "{{ ansible_system == 'Darwin' }}"
        is_linux: "{{ ansible_system == 'Linux' }}"
        is_wsl: "{{ ansible_kernel is search('WSL') or ansible_kernel is search('Microsoft') }}"
        is_archlinux: "{{ ansible_distribution == 'Archlinux' }}"

    - name: Normalize runtime path variables
      ansible.builtin.set_fact:
        xdg_config_home: "{{ active_home }}/.config"
        xdg_data_home: "{{ active_home }}/.local/share"
        xdg_state_home: "{{ active_home }}/.local/state"
        xdg_cache_home: "{{ active_home }}/.cache"
        local_bin_dir: "{{ active_home }}/.local/bin"
        consumer_contract_dir: "{{ active_home }}/.config/dotfiles"
        consumer_contract_env_dir: "{{ active_home }}/.config/dotfiles/env"
        consumer_contract_docs_dir: "{{ active_home }}/.config/dotfiles/contracts"

  roles:
    - role: common
    - role: aur
      when:
        - is_archlinux | bool
        - aur_enabled | bool
    - role: identity
      when: identity_enabled | bool
    - role: python_dev
      when: python_dev_enabled | bool
    - role: ecmascript
      when: ecmascript_enabled | bool
    - role: golang
      when: golang_enabled | bool
    - role: tower
      when: tower_enabled | bool
    - role: appearance
      when: appearance_enabled | bool
    - role: shell
      when: shell_enabled | bool
    - role: tty
      when: tty_enabled | bool
    - role: linux_desktop
      when:
        - linux_desktop_enabled | bool
        - is_linux | bool
    - role: hyprland
      when:
        - hyprland_enabled | bool
        - is_linux | bool
    - role: system_tty_login
      when:
        - system_tty_login_enabled | bool
        - is_linux | bool
    - role: browser_base
      when: browser_base_enabled | bool
    - role: browser_personal
      when: browser_personal_enabled | bool
    - role: media
      when: media_enabled | bool
    - role: nvim
      when: nvim_enabled | bool
    - role: pkm
      when: pkm_enabled | bool
    - role: pim
      when: pim_enabled | bool
    - role: email
      when: email_enabled | bool
    - role: r_lang
      when: r_lang_enabled | bool
    - role: java
      when: java_enabled | bool
    - role: share_sync
      when: share_sync_enabled | bool
    - role: llm
      when: llm_enabled | bool
    - role: vscode
      when: vscode_enabled | bool
    - role: peripherals
      when: peripherals_enabled | bool
    - role: cloud
      when: cloud_enabled | bool
    - role: oci
      when: oci_enabled | bool
    - role: android_dev
      when: android_dev_enabled | bool

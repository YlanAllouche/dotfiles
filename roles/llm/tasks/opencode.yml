- name: Install OpenCode on Arch through yay
  become: true
  become_user: "{{ aur_builder_user }}"
  kewlfft.aur.aur:
    use: yay
    name: "{{ llm_opencode_aur_packages }}"
    state: present
  when:
    - is_archlinux | bool
    - aur_install_method == 'yay'

- name: Install OpenCode on Arch through pacman
  become: true
  community.general.pacman:
    name: "{{ llm_opencode_aur_packages }}"
    state: present
  when:
    - is_archlinux | bool
    - aur_install_method == 'pacman'

- name: Install OpenCode on macOS
  community.general.homebrew:
    name: "{{ llm_opencode_homebrew_packages }}"
    state: present
  when: is_macos | bool

- name: Ensure OpenCode config directory exists
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/opencode"
    state: directory
    mode: "0755"

- name: Install OpenCode configuration files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop:
    - src: opencode/opencode.json
      dest: "{{ xdg_config_home }}/opencode/opencode.json"
    - src: opencode/tui.json
      dest: "{{ xdg_config_home }}/opencode/tui.json"
    - src: opencode/opencode-notifier.json
      dest: "{{ xdg_config_home }}/opencode/opencode-notifier.json"

- name: Install OpenCode Neovim overlay
  # TODO: Move the opencode.nvim lock ownership out of the base nvim role once
  # plugin lock management is separated cleanly from the shared Neovim baseline.
  ansible.builtin.copy:
    src: opencode/nvim/plugins/opencode.lua
    dest: "{{ xdg_config_home }}/nvim/lua/plugins/opencode.lua"
    mode: "0644"
  when: nvim_enabled | bool

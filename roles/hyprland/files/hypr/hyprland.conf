
source = ~/.cache/wal/colors-hyprland.conf

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

# TODO: Make it modular with a folder



monitor=,preferred,auto,auto
monitor= HDMI-A-1,preferred,auto,1.25 # TODO: Is this machine or monitor specific?




#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = waybar & hyprpaper & firefox


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = GDK_SCALE,1.5
env = XDG_SESSION_TYPE,wayland
env = WLR_NO_HARDWARE_CURSORS,1

env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic

# GPU-driver-specific overrides belong in a downstream drop-in once the
# machine-specific graphics stack is configured.
# env = LIBVA_DRIVER_NAME,nvidia
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = WLR_DRM_DEVICES,/dev/dri/card0
# env = WLR_RENDERER,vulkan

env = EDITOR, nvim
# env = BROWSER, firefox -P main
$terminal = kitty 
$fileManager = pcmanfm 
$fileManager = kitty --title FileManager ranger 
$menu = wofi --show drun

xwayland {
  force_zero_scaling = true
}


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    no_focus_fallback=true
    gaps_in = 7
    gaps_out = 7

    border_size = 0

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = $color15

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

     layout = dwindle
     # layout = master 
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 2
    rounding_power = 3

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 0
        render_power = 0
        #color = $color1
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
blur {
  enabled = true
  size = 8
  passes = 2
  new_optimizations = yes
  ignore_opacity=true
}

}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    #enabled = yes #, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade

    #TODO: conside for laptop
    #enabled = true
    #bezier = fluid, 0.15, 0.85, 0.25, 1
    #bezier = snappy, 0.3, 1, 0.4, 1
    #animation = windows, 1, 3, fluid, popin 5%
    #animation = windowsOut, 1, 2.5, snappy
    #animation = fade, 1, 4, snappy
    #animation = workspaces, 1, 1.7, snappy, slide
    #animation = specialWorkspace, 1, 4, fluid, slidefadevert -35%
    #animation = layers, 1, 2, snappy, popin 70%
}

dwindle {
    preserve_split = true
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
# windowrulev2 = rounding 0, floating:0, onworkspace:f[1]
# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true  # If true disables the random hyprland logo / anime girl background. :(
}

debug {
    # Temporary diagnostics for VM bring-up.
    disable_logs = false
    disable_time = false
    enable_stdout_logs = true
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true 
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures

# gestures {
#     workspace_swipe = true
#         workspace_swipe_distance = 300
#         workspace_swipe_cancel_ratio = .05
#         workspace_swipe_min_speed_to_force = 0
# }

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
source = ~/.config/hypr/conf.d/*.conf

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, return, exec, $terminal
bind = $mainMod, Tab, workspace, previous
bind = $mainMod, T, togglegroup 
bind = $mainMod SHIFT, G, moveintogroup, 
bind = $mainMod SHIFT, T, lockgroups, toggle
bind = $mainMod ALT, T, exec, hyprctl dispatch moveoutofgroup
bind = $mainMod, W, killactive,
# bind = $mainMod, M, exit,
bind = $mainMod SHIFT, E, exec, $fileManager
bind = $mainMod, E, exec, kitty -d ~/share  nvim 
bind = $mainMod, V, togglefloating,
bind = $mainMod, space, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, R, togglesplit, # dwindle
bind = alt, Tab, changegroupactive, next 

# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

bind = $mainMod, A, togglespecialworkspace, obsi 
bind = $mainMod SHIFT, A, movetoworkspace, special:obsi

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bind = Shift, Print, exec, grim -g "$(slurp -d)" ~/Media/screenshots/$(date +'%Y%m%d_%H%M%S').png
bind = Alt, Print, exec, grim -o $(hyprctl monitors -j | jq -r '.[] | select(.focused) | .name') ~/Media/screenshots/$(date +'%Y%m%d_%H%M%S').png

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

bind = $mainMod, f, fullscreen
bind = $mainMod, z, pin
bind = $mainMod SHIFT, V, exec, hyprlock 
bind = , Print, exec, grim -g "$(slurp -d)" - | wl-copy
bind = CTRL, Print, exec, grim -g "$(slurp -d)" - | tesseract - stdout | wl-copy

bind = $mainMod, Print, exec, $HOME/.local/bin/record start area
# TODO: Rework the recorder integration to expose the GIF workflow explicitly.
bind = $mainMod SHIFT, Print, exec, $HOME/.local/bin/record start screen
bind = $mainMod ALT, Print, exec, $HOME/.local/bin/record stop


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
# suppressevent maximize is deprecated - removed

# Fix some dragging issues with XWayland - commented out due to regex parsing issues
# windowrule = match:class ^$ match:title ^$ match:xwayland 1 match:floating 1 match:fullscreen 0 match:pinned 0, nofocus on
#windowrulev2 = blur, class:^(kitty)$
# windowrulev2 = blurr, class:^(firefox)$

# =============================
# =============================

input {
	repeat_rate = 40
	repeat_delay = 150
}


# exec-once = nm-applet &
# Re-enable once the media role is part of the baseline profile.
# exec-once = jellyfin-mpv-shim  &
# exec-once = hyprctl dispatch workspace 1 &
exec-once = awww-daemon & 
# TODO: Apply the current wallpaper symlink through awww once the appearance
# layer finalizes the shared wallpaper path contract.
# exec-once = dunst & 
exec-once = waybar &
# exec-once = nextcloud &
exec-once = tailscale up &
exec-once = swaync
exec-once = hypridle
# exec-once = pactl set-sink-mute @DEFAULT_SINK@ 0
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
# exec-once = mopidy & 

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
layerrule = ignore_alpha 0.5, match:namespace waybar

layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window
layerrule = no_anim on, match:namespace selection

bind = $mainMod ALT, h, movewindow, l
bind = $mainMod ALT, l, movewindow, r
bind = $mainMod ALT, k, movewindow, u
bind = $mainMod ALT, j, movewindow, d 
bind = $mainMod SHIFT, h, resizeactive,-30 0
bind = $mainMod SHIFT, l, resizeactive,30 0
bind = $mainMod SHIFT, k, resizeactive,0 -30
bind = $mainMod SHIFT, j, resizeactive,0 30

# TODO: what? bind = ALT, TAB, exec, wlogout -b 2
group {
    groupbar {
    indicator_height = 0
    indicator_gap = 0
        enabled = true
rounding = 0
gaps_in = 0
    gradient_rounding = 5
gaps_out = 0
        col.active = $color6 
        col.inactive = $color4 
        stacked  = false
        col.locked_active = $color9
        col.locked_inactive = $color4
        font_size = 15
        gradients = true 
        render_titles =  true 
        text_color = $color0
        height = 20
    }
}

bind = $mainMod, q, exec, ~/.local/bin/refreshQueries.sh
bind = $mainMod SHIFT, Q, exec, chromium --app="http://localhost:8081" --disable-web-security --disable-extensions --no-first-run --disable-infobars --no-default-browser-check
bind = , XF86MonBrightnessUp, exec, ddcutil setvcp 10 + 30
bind = , XF86MonBrightnessDown, exec, ddcutil setvcp 10 - 10

# TODO: fix the special obsi workspace being active on boot
# exec-once = hyprctl dispatch togglespecialworkspace obsi &
exec-once = hyprlock &

# TODO: Fix mpv rules
# windowrule = float, ^(mpv)$
# windowrule = size 40%, match:class ^(mpv)$
windowrule = match:title Video Selector, float on
windowrule = match:title Dofus, float on
windowrule = match:class mpv, float on
# exec-once = hyprctl dispatch togglespecialworkspace obsi &
# windowrule = no_anim on, match:class ^(firefox)$
# TODO: easily add a kitty instance to something, maybe have it only if not firefox, or change firefox' shortcut or a mix of 2
windowrule = match:class jelly-mpv, float on
windowrule = match:class jelly-mpv, workspace special:magic

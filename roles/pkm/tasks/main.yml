- name: Install PKM packages on Arch
  become: true
  community.general.pacman:
    name: "{{ pkm_arch_packages }}"
    state: present
  when: is_archlinux | bool

- name: Install PKM packages on macOS
  community.general.homebrew_cask:
    name: "{{ pkm_homebrew_casks }}"
    install_options: "{{ homebrew_cask_install_options }}"
    state: present
  when: is_macos | bool

- name: Install PKM helper scripts
  ansible.builtin.copy:
    src: bin/refreshQueries.sh
    dest: "{{ local_bin_dir }}/refreshQueries.sh"
    mode: "0755"

- name: Install PKM initiative selector
  ansible.builtin.copy:
    src: bin/init-selector
    dest: "{{ local_bin_dir }}/init-selector"
    mode: "0755"

- name: Install PKM tmux keymap drop-in
  ansible.builtin.copy:
    src: tmux/pkm.conf
    dest: "{{ xdg_config_home }}/tmux/conf.d/90-pkm.conf"
    mode: "0644"

- name: Ensure PKM Hyprland drop-in directory exists
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/hypr/conf.d"
    state: directory
    mode: "0755"
  when:
    - is_linux | bool
    - hyprland_enabled | default(false) | bool

- name: Install PKM Hyprland Obsidian drop-in
  ansible.builtin.copy:
    src: hypr/obsidian.conf
    dest: "{{ xdg_config_home }}/hypr/conf.d/90-obsidian.conf"
    mode: "0644"
  when:
    - is_linux | bool
    - hyprland_enabled | default(false) | bool

- name: Install PKM Python packages
  ansible.builtin.pip:
    name: "{{ pkm_python_packages }}"
    extra_args: --user --break-system-packages
    executable: "{{ pip3_executable }}"
  environment: "{{ python_pip_environment }}"
  when: is_archlinux | bool

- name: Install PKM Python packages on macOS
  ansible.builtin.pip:
    name: "{{ pkm_python_packages }}"
    extra_args: --user --break-system-packages
    executable: "{{ pip3_executable }}"
  environment: "{{ python_pip_environment }}"
  when: is_macos | bool

- name: Ensure Obsidian config directory exists
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/obsidian"
    state: directory
    mode: "0755"

- name: Install obsi-dash compatibility wrapper
  ansible.builtin.copy:
    dest: "{{ local_bin_dir }}/obsi-dash"
    mode: "0755"
    content: |
      #!/usr/bin/env python3
      import sys
      from playlist_maker.main import main

      if __name__ == "__main__":
          if sys.argv[0].endswith(".exe"):
              sys.argv[0] = sys.argv[0][:-4]
          sys.exit(main())

- name: Install Obsidian app config
  ansible.builtin.template:
    src: obsidian.json.j2
    dest: "{{ xdg_config_home }}/obsidian/obsidian.json"
    mode: "0644"

- name: Install PKM-specific Neovim overlays
  # TODO: Continue shrinking PKM ownership to only the dataview/JSON-bound
  # Markdown features as the base Neovim config gets cleaned up further.
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop:
    - src: nvim/dataview_picker.lua
      dest: "{{ xdg_config_home }}/nvim/lua/config/dataview_picker.lua"
    - src: nvim/pkm_dataview_keymaps.lua
      dest: "{{ xdg_config_home }}/nvim/lua/config/pkm_dataview_keymaps.lua"
    - src: nvim/markdown/bookmark_picker.lua
      dest: "{{ xdg_config_home }}/nvim/lua/config/markdown/bookmark_picker.lua"
    - src: nvim/markdown/bookmarks.lua
      dest: "{{ xdg_config_home }}/nvim/lua/config/markdown/bookmarks.lua"
    - src: nvim/markdown/insertinline.lua
      dest: "{{ xdg_config_home }}/nvim/lua/config/markdown/insertinline.lua"
    - src: nvim/markdown/insertlink.lua
      dest: "{{ xdg_config_home }}/nvim/lua/config/markdown/insertlink.lua"

- name: Apply hyprland profile
  hosts: all
  gather_facts: true

  vars_files:
    - ../group_vars/all.yml

  vars:
    dotfiles_profile: hyprland
    identity_enabled: true
    appearance_enabled: true
    shell_enabled: true
    tty_enabled: true
    python_dev_enabled: true
    ecmascript_enabled: true
    golang_enabled: true
    tower_enabled: true
    linux_desktop_enabled: true
    hyprland_enabled: true
    system_tty_login_enabled: true
    browser_base_enabled: true
    browser_personal_enabled: false
    browser_bitwarden_enabled: false
    media_enabled: false
    nvim_enabled: true
    pkm_enabled: false
    pim_enabled: false
    email_enabled: false
    r_lang_enabled: false
    java_enabled: false
    share_sync_enabled: false
    llm_enabled: true
    llm_opencode_enabled: true
    llm_claudecode_enabled: false
    vscode_enabled: true
    tty_dv_enabled: true
    tty_gh_enabled: true
    tty_glab_enabled: true
    tty_newsboat_enabled: true
    tty_neofetch_enabled: true
    tty_pywal_enabled: true
    appearance_generate_wallpapers: false
    appearance_install_colorwhirl_target: false
    appearance_install_matugen: true

  pre_tasks:
    - name: Apply hyprland profile toggles
      ansible.builtin.set_fact:
        dotfiles_profile: hyprland
        identity_enabled: true
        appearance_enabled: true
        shell_enabled: true
        tty_enabled: true
        python_dev_enabled: true
        ecmascript_enabled: true
        golang_enabled: true
        tower_enabled: true
        linux_desktop_enabled: true
        hyprland_enabled: true
        system_tty_login_enabled: true
        browser_base_enabled: true
        browser_personal_enabled: false
        browser_bitwarden_enabled: false
        media_enabled: false
        nvim_enabled: true
        pkm_enabled: false
        pim_enabled: false
        email_enabled: false
        r_lang_enabled: false
        java_enabled: false
        share_sync_enabled: false
        llm_enabled: true
        llm_opencode_enabled: true
        llm_claudecode_enabled: false
        vscode_enabled: true
        tty_dv_enabled: true
        tty_gh_enabled: true
        tty_glab_enabled: true
        tty_newsboat_enabled: true
        tty_neofetch_enabled: true
        tty_pywal_enabled: true
        appearance_generate_wallpapers: false
        appearance_install_colorwhirl_target: false
        appearance_install_matugen: true

    - name: Normalize runtime user and platform variables
      ansible.builtin.set_fact:
        active_user: "{{ dotfiles_active_user | default(ansible_user_id) }}"
        active_home: >-
          {{
            dotfiles_active_home
            | default(
              lookup('env', 'HOME')
              if inventory_hostname == 'localhost'
              else (
                '/Users/' ~ (dotfiles_active_user | default(ansible_user_id))
                if ansible_system == 'Darwin'
                else '/home/' ~ (dotfiles_active_user | default(ansible_user_id))
              )
            )
          }}
        platform_family: "{{ 'macos' if ansible_system == 'Darwin' else 'linux' }}"
        is_macos: "{{ ansible_system == 'Darwin' }}"
        is_linux: "{{ ansible_system == 'Linux' }}"
        is_wsl: "{{ ansible_kernel is search('WSL') or ansible_kernel is search('Microsoft') }}"
        is_archlinux: "{{ ansible_distribution == 'Archlinux' }}"

    - name: Normalize runtime path variables
      ansible.builtin.set_fact:
        xdg_config_home: "{{ active_home }}/.config"
        xdg_data_home: "{{ active_home }}/.local/share"
        xdg_state_home: "{{ active_home }}/.local/state"
        xdg_cache_home: "{{ active_home }}/.cache"
        local_bin_dir: "{{ active_home }}/.local/bin"
        consumer_contract_dir: "{{ active_home }}/.config/dotfiles"
        consumer_contract_env_dir: "{{ active_home }}/.config/dotfiles/env"
        consumer_contract_docs_dir: "{{ active_home }}/.config/dotfiles/contracts"

    - name: Refresh pacman package databases on Arch
      become: true
      community.general.pacman:
        update_cache: true
      when: is_archlinux | bool

  roles:
    - role: common
    - role: aur
      when:
        - is_archlinux | bool
        - aur_enabled | default(true) | bool
    - role: identity
      when: identity_enabled | default(false) | bool
    - role: python_dev
      when: python_dev_enabled | default(false) | bool
    - role: ecmascript
      when: ecmascript_enabled | default(false) | bool
    - role: golang
      when: golang_enabled | default(false) | bool
    - role: tower
      when: tower_enabled | default(false) | bool
    - role: appearance
      when: appearance_enabled | default(false) | bool
    - role: shell
      when: shell_enabled | default(false) | bool
    - role: tty
      when: tty_enabled | default(false) | bool
    - role: linux_desktop
      when:
        - linux_desktop_enabled | default(false) | bool
        - is_linux | bool
    - role: hyprland
      when:
        - hyprland_enabled | default(false) | bool
        - is_linux | bool
    - role: system_tty_login
      when:
        - system_tty_login_enabled | default(false) | bool
        - is_linux | bool
    - role: browser_base
      when: browser_base_enabled | default(false) | bool
    - role: browser_personal
      when: browser_personal_enabled | default(false) | bool
    - role: media
      when: media_enabled | default(false) | bool
    - role: nvim
      when: nvim_enabled | default(false) | bool
    - role: pkm
      when: pkm_enabled | default(false) | bool
    - role: pim
      when: pim_enabled | default(false) | bool
    - role: email
      when: email_enabled | default(false) | bool
    - role: r_lang
      when: r_lang_enabled | default(false) | bool
    - role: java
      when: java_enabled | default(false) | bool
    - role: share_sync
      when: share_sync_enabled | default(false) | bool
    - role: llm
      when: llm_enabled | default(false) | bool
    - role: vscode
      when: vscode_enabled | default(false) | bool
    - role: peripherals
      when: peripherals_enabled | default(false) | bool
    - role: cloud
      when: cloud_enabled | default(false) | bool
    - role: oci
      when: oci_enabled | default(false) | bool
    - role: android_dev
      when: android_dev_enabled | default(false) | bool

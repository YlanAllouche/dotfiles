- name: Install base browser packages on Arch
  become: true
  community.general.pacman:
    name: "{{ browser_base_arch_packages }}"
    state: present
  when: is_archlinux | bool

- name: Install base browser packages on macOS
  community.general.homebrew_cask:
    name: "{{ browser_base_homebrew_casks }}"
    install_options: "{{ homebrew_cask_install_options }}"
    state: present
  when: is_macos | bool

- name: Install browser launcher script
  ansible.builtin.copy:
    src: bin/browser
    dest: "{{ local_bin_dir }}/browser"
    mode: "0755"

- name: Ensure shell snippet directory exists for browser export
  ansible.builtin.file:
    path: "{{ active_home }}/.local/config/shell"
    state: directory
    mode: "0755"

- name: Export browser helper path in shell snippets
  ansible.builtin.copy:
    dest: "{{ active_home }}/.local/config/shell/40-browser.zsh"
    mode: "0644"
    content: |
      export BROWSER="{{ local_bin_dir }}/browser"

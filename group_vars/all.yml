dotfiles_profile: base

active_user: "{{ dotfiles_active_user | default(ansible_user_id) }}"
active_home: >-
  {{
    dotfiles_active_home
    | default(
      lookup('env', 'HOME')
      if inventory_hostname == 'localhost'
      else (
        '/Users/' ~ active_user
        if ansible_system == 'Darwin'
        else '/home/' ~ active_user
      )
    )
  }}

platform_family: "{{ 'macos' if ansible_system == 'Darwin' else 'linux' }}"
is_macos: "{{ ansible_system == 'Darwin' }}"
is_linux: "{{ ansible_system == 'Linux' }}"
is_wsl: "{{ ansible_kernel is search('WSL') or ansible_kernel is search('Microsoft') }}"
is_archlinux: "{{ ansible_distribution == 'Archlinux' }}"

xdg_config_home: "{{ active_home }}/.config"
xdg_data_home: "{{ active_home }}/.local/share"
xdg_state_home: "{{ active_home }}/.local/state"
xdg_cache_home: "{{ active_home }}/.cache"
local_bin_dir: "{{ active_home }}/.local/bin"
dotfiles_repo_root: >-
  {{
    playbook_dir
    if (playbook_dir | basename) != 'playbooks'
    else (playbook_dir | dirname)
  }}

# NOTES: This is the interface between the public dotfiles layer and the
# private infra layer that builds images and provisions drivers.
CPU_VENDOR: AMD
GPU_VENDOR: NVIDIA

# NOTES: Override this from the infra layer when a machine needs a branch-
# specific NVIDIA stack such as nvidia-580xx-dkms/nvidia-580xx-utils.
NVIDIA_REQUIRED_PACKAGE_GROUPS:
  - description: NVIDIA kernel driver package
    any_of:
      - nvidia
      - nvidia-dkms
  - description: NVIDIA userspace package
    any_of:
      - nvidia-utils
  - description: EGL Wayland bridge
    any_of:
      - egl-wayland
  - description: DKMS framework
    any_of:
      - dkms

aur_enabled: true
aur_install_method: yay
aur_builder_user: aur_builder


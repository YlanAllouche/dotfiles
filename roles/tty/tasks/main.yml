- name: Install tty packages on Arch
  become: true
  community.general.pacman:
    name: "{{ tty_base_arch_packages }}"
    state: present
  when: is_archlinux | bool

- name: Install tty packages on macOS
  community.general.homebrew:
    name: "{{ tty_base_homebrew_packages }}"
    state: present
  when: is_macos | bool

- name: Install pywal on Arch
  become: true
  community.general.pacman:
    name: "{{ tty_pywal_package }}"
    state: present
  when:
    - is_archlinux | bool
    - tty_pywal_enabled | bool

- name: Install GitHub CLI on Arch
  become: true
  community.general.pacman:
    name: github-cli
    state: present
  when:
    - is_archlinux | bool
    - tty_gh_enabled | bool

- name: Install GitHub CLI on macOS
  community.general.homebrew:
    name: gh
    state: present
  when:
    - is_macos | bool
    - tty_gh_enabled | bool

- name: Install GitLab CLI on Arch
  become: true
  community.general.pacman:
    name: glab
    state: present
  when:
    - is_archlinux | bool
    - tty_glab_enabled | bool

- name: Install GitLab CLI on macOS
  community.general.homebrew:
    name: glab
    state: present
  when:
    - is_macos | bool
    - tty_glab_enabled | bool

- name: Install Newsboat on Arch
  become: true
  community.general.pacman:
    name: newsboat
    state: present
  when:
    - is_archlinux | bool
    - tty_newsboat_enabled | bool

- name: Install Newsboat on macOS
  community.general.homebrew:
    name: newsboat
    state: present
  when:
    - is_macos | bool
    - tty_newsboat_enabled | bool

- name: Install Neofetch on Arch
  become: true
  community.general.pacman:
    name: neofetch
    state: present
  when:
    - is_archlinux | bool
    - tty_neofetch_enabled | bool

- name: Install Neofetch on macOS
  community.general.homebrew:
    name: neofetch
    state: present
  when:
    - is_macos | bool
    - tty_neofetch_enabled | bool

- name: Ensure tmux-sessionizer config directory exists
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/tmux-sessionizer"
    state: directory
    mode: "0755"

- name: Ensure Newsboat config directory exists
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/newsboat"
    state: directory
    mode: "0755"
  when: tty_newsboat_enabled | bool

- name: Ensure CLI config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ xdg_config_home }}/gh"
    - "{{ xdg_config_home }}/glab-cli"
  when: tty_gh_enabled | bool or tty_glab_enabled | bool

- name: Install tmux configuration and helper scripts
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "{{ item.mode | default('0644') }}"
  loop:
    - src: tmux.conf
      dest: "{{ active_home }}/.tmux.conf"
    - src: tmux-sessionizer/tmux-sessionizer.conf
      dest: "{{ xdg_config_home }}/tmux-sessionizer/tmux-sessionizer.conf"
    - src: bin/tmux-sessionizer
      dest: "{{ local_bin_dir }}/tmux-sessionizer"
      mode: "0755"
    - src: bin/tmux-session-switch.sh
      dest: "{{ local_bin_dir }}/tmux-session-switch.sh"
      mode: "0755"
    - src: bin/init-selector
      dest: "{{ local_bin_dir }}/init-selector"
      mode: "0755"
    - src: bin/git-branch-switcher
      dest: "{{ local_bin_dir }}/git-branch-switcher"
      mode: "0755"
    - src: bin/project-selector.py
      dest: "{{ local_bin_dir }}/project-selector.py"
      mode: "0755"
    - src: inputrc
      dest: "{{ active_home }}/.inputrc"

- name: Install Newsboat URL list
  ansible.builtin.copy:
    src: newsboat-urls
    dest: "{{ xdg_config_home }}/newsboat/urls"
    mode: "0644"
  when: tty_newsboat_enabled | bool

- name: Install gh configuration
  ansible.builtin.copy:
    src: gh-config.yml
    dest: "{{ xdg_config_home }}/gh/config.yml"
    mode: "0644"
  when: tty_gh_enabled | bool

- name: Install glab aliases
  ansible.builtin.copy:
    src: glab-aliases.yml
    dest: "{{ xdg_config_home }}/glab-cli/aliases.yml"
    mode: "0644"
  when: tty_glab_enabled | bool

- name: Install glab configuration skeleton
  ansible.builtin.template:
    src: glab-config.yml.j2
    dest: "{{ xdg_config_home }}/glab-cli/config.yml"
    mode: "0644"
  when: tty_glab_enabled | bool

- name: Ensure TPM is installed
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tpm
    dest: "{{ active_home }}/.tmux/plugins/tpm"
    version: master
  when: tty_tmux_bootstrap_enabled | bool

- name: Bootstrap tmux plugins
  ansible.builtin.shell: |
    set -eu
    tmux start-server
    tmux new-session -d -s dotfiles-bootstrap || true
    "{{ active_home }}/.tmux/plugins/tpm/bin/install_plugins"
    tmux kill-session -t dotfiles-bootstrap || true
  args:
    executable: /bin/bash
  when: tty_tmux_bootstrap_enabled | bool

- name: Install dv helper for tty workflows
  ansible.builtin.copy:
    src: bin/dv
    dest: "{{ local_bin_dir }}/dv"
    mode: "0755"
  when: tty_dv_enabled | bool

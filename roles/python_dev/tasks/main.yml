- name: Install Python development packages on Arch
  become: true
  community.general.pacman:
    name: "{{ python_dev_arch_packages }}"
    state: present
  when: is_archlinux | bool

- name: Install Python development packages on macOS
  community.general.homebrew:
    name: "{{ python_dev_homebrew_packages }}"
    state: present
  when: is_macos | bool

- name: Install global Python development packages on Arch
  ansible.builtin.pip:
    name: "{{ python_dev_global_packages }}"
    extra_args: --user --break-system-packages
    executable: "{{ pip3_executable }}"
  environment: "{{ python_pip_environment }}"
  when: is_archlinux | bool

- name: Install global Python development packages on macOS
  ansible.builtin.pip:
    name: "{{ python_dev_global_packages + python_dev_global_macos_packages }}"
    extra_args: --user --break-system-packages
    executable: "{{ pip3_executable }}"
  environment: "{{ python_pip_environment }}"
  when: is_macos | bool

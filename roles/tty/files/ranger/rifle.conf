# vim: ft=cfg
# Custom rifle.conf - simple defaults for PDF, HTML, text, and empty files

# PDF files - zathura as default
ext pdf, has zathura, X, flag f = zathura -- "$@"

# HTML files - open in editor
ext x?html? = ${VISUAL:-$EDITOR} -- "$@"

# Empty/zero-byte files - open in editor
size 0 = ${VISUAL:-$EDITOR} -- "$@"

# Text files - open in editor
mime ^text = ${VISUAL:-$EDITOR} -- "$@"

# Code files without explicit text mime type - open in editor
!mime ^text, ext xml|json|csv|tex|py|pl|rb|js|sh|php = ${VISUAL:-$EDITOR} -- "$@"

- name: Install tty packages on Arch
  become: true
  community.general.pacman:
    name: "{{ tty_base_arch_packages }}"
    state: present
  when: is_archlinux | bool

- name: Install tty packages on macOS
  community.general.homebrew:
    name: "{{ tty_base_homebrew_packages }}"
    state: present
  when: is_macos | bool

- name: Install tty Python packages on Arch
  ansible.builtin.pip:
    name: "{{ tty_python_packages }}"
    extra_args: --user --break-system-packages
    executable: "{{ pip3_executable }}"
  environment: "{{ python_pip_environment }}"
  when:
    - is_archlinux | bool
    - tty_python_packages | length > 0

- name: Install tty Python packages on macOS
  ansible.builtin.pip:
    name: "{{ tty_python_packages }}"
    extra_args: --user --break-system-packages
    executable: "{{ pip3_executable }}"
  environment: "{{ python_pip_environment }}"
  when:
    - is_macos | bool
    - tty_python_packages | length > 0

- name: Install NVIDIA tty Python packages on Linux
  ansible.builtin.pip:
    name: "{{ tty_nvidia_python_packages }}"
    extra_args: --user --break-system-packages
    executable: "{{ pip3_executable }}"
  environment: "{{ python_pip_environment }}"
  when:
    - is_linux | bool
    - GPU_VENDOR | lower == 'nvidia'

- name: Install gitmux on Arch through yay
  become: true
  become_user: "{{ aur_builder_user }}"
  kewlfft.aur.aur:
    use: yay
    name: "{{ tty_gitmux_aur_package }}"
    state: present
  when:
    - is_archlinux | bool
    - aur_install_method == 'yay'

- name: Install gitmux on Arch through pacman
  become: true
  community.general.pacman:
    name: "{{ tty_gitmux_aur_package }}"
    state: present
  when:
    - is_archlinux | bool
    - aur_install_method == 'pacman'

- name: Install pywal on Arch
  become: true
  community.general.pacman:
    name: "{{ tty_pywal_package }}"
    state: present
  when:
    - is_archlinux | bool
    - tty_pywal_enabled | bool

- name: Install GitHub CLI on Arch
  become: true
  community.general.pacman:
    name: github-cli
    state: present
  when:
    - is_archlinux | bool
    - tty_gh_enabled | bool

- name: Install GitHub CLI on macOS
  community.general.homebrew:
    name: gh
    state: present
  when:
    - is_macos | bool
    - tty_gh_enabled | bool

- name: Install GitLab CLI on Arch
  become: true
  community.general.pacman:
    name: glab
    state: present
  when:
    - is_archlinux | bool
    - tty_glab_enabled | bool

- name: Install GitLab CLI on macOS
  community.general.homebrew:
    name: glab
    state: present
  when:
    - is_macos | bool
    - tty_glab_enabled | bool

- name: Install Newsboat on Arch
  become: true
  community.general.pacman:
    name: newsboat
    state: present
  when:
    - is_archlinux | bool
    - tty_newsboat_enabled | bool

- name: Install Newsboat on macOS
  community.general.homebrew:
    name: newsboat
    state: present
  when:
    - is_macos | bool
    - tty_newsboat_enabled | bool

- name: Install Neofetch on Arch through yay
  become: true
  become_user: "{{ aur_builder_user }}"
  kewlfft.aur.aur:
    use: yay
    name: neofetch
    state: present
  when:
    - is_archlinux | bool
    - tty_neofetch_enabled | bool
    - aur_install_method == 'yay'

- name: Install Neofetch on Arch through pacman
  become: true
  community.general.pacman:
    name: neofetch
    state: present
  when:
    - is_archlinux | bool
    - tty_neofetch_enabled | bool
    - aur_install_method == 'pacman'

- name: Install Neofetch on macOS
  community.general.homebrew:
    name: neofetch
    state: present
  when:
    - is_macos | bool
    - tty_neofetch_enabled | bool

- name: Ensure tmux-sessionizer config directory exists
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/tmux-sessionizer"
    state: directory
    mode: "0755"

- name: Ensure ranger config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ xdg_config_home }}/ranger"
    - "{{ xdg_config_home }}/ranger/plugins"

- name: Ensure bat config directory exists
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/bat"
    state: directory
    mode: "0755"

- name: Ensure tmux plugin directory exists
  ansible.builtin.file:
    path: "{{ active_home }}/.tmux/plugins"
    state: directory
    mode: "0755"

- name: Ensure neofetch config directory exists
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/neofetch"
    state: directory
    mode: "0755"
  when: tty_neofetch_enabled | bool

- name: Ensure tmux drop-in config directory exists
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/tmux/conf.d"
    state: directory
    mode: "0755"

- name: Ensure Newsboat config directory exists
  ansible.builtin.file:
    path: "{{ xdg_config_home }}/newsboat"
    state: directory
    mode: "0755"
  when: tty_newsboat_enabled | bool

- name: Ensure CLI config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ xdg_config_home }}/gh"
    - "{{ xdg_config_home }}/glab-cli"
  when: tty_gh_enabled | bool or tty_glab_enabled | bool

- name: Install tmux plugin manager
  ansible.builtin.git:
    repo: "{{ tty_tpm_repo }}"
    dest: "{{ active_home }}/.tmux/plugins/tpm"
    version: master

- name: Install upstream tmux-sessionizer repository
  ansible.builtin.git:
    repo: "{{ tty_tmux_sessionizer_repo }}"
    dest: "{{ xdg_data_home }}/tmux-sessionizer"
    version: master

- name: Install ranger devicons plugin
  # TODO: Split the custom emoji-focused ranger devicons fork into its own repo.
  ansible.builtin.copy:
    src: ranger/plugins/ranger_devicons/
    dest: "{{ xdg_config_home }}/ranger/plugins/ranger_devicons/"
    mode: preserve

- name: Install tmux configuration and helper scripts
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "{{ item.mode | default('0644') }}"
  loop:
    - src: tmux.conf
      dest: "{{ active_home }}/.tmux.conf"
    - src: tmux-sessionizer/tmux-sessionizer.conf
      dest: "{{ xdg_config_home }}/tmux-sessionizer/tmux-sessionizer.conf"
    - src: bin/tmux-session-switch.sh
      dest: "{{ local_bin_dir }}/tmux-session-switch.sh"
      mode: "0755"
    - src: inputrc
      dest: "{{ active_home }}/.inputrc"

- name: Install bat configuration
  ansible.builtin.copy:
    src: bat/config
    dest: "{{ xdg_config_home }}/bat/config"
    mode: "0644"

- name: Install ranger configuration files
  # TODO: Decide whether tty should provide a plocate/mlocate-backed locate workflow.
  # TODO: Decide whether ranger/html previews should grow a lynx or elinks fallback.
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "{{ item.mode | default('0644') }}"
  loop:
    - src: ranger/rc.conf
      dest: "{{ xdg_config_home }}/ranger/rc.conf"
    - src: ranger/rifle.conf
      dest: "{{ xdg_config_home }}/ranger/rifle.conf"
    - src: ranger/scope.sh
      dest: "{{ xdg_config_home }}/ranger/scope.sh"
      mode: "0755"
    - src: ranger/commands.py
      dest: "{{ xdg_config_home }}/ranger/commands.py"
    - src: ranger/plugins/unicode_icons.py
      dest: "{{ xdg_config_home }}/ranger/plugins/unicode_icons.py"

- name: Check existing tmux-sessionizer link target
  ansible.builtin.stat:
    path: "{{ local_bin_dir }}/tmux-sessionizer"
    follow: false
  register: tty_tmux_sessionizer_link

- name: Remove legacy tmux-sessionizer file before linking upstream checkout
  ansible.builtin.file:
    path: "{{ local_bin_dir }}/tmux-sessionizer"
    state: absent
  when:
    - tty_tmux_sessionizer_link.stat.exists | default(false)
    - not tty_tmux_sessionizer_link.stat.islnk | default(false)

- name: Link tmux-sessionizer binary from upstream checkout
  ansible.builtin.file:
    src: "{{ xdg_data_home }}/tmux-sessionizer/tmux-sessionizer"
    dest: "{{ local_bin_dir }}/tmux-sessionizer"
    state: link

- name: Install glcreate when GitLab tooling is enabled
  ansible.builtin.copy:
    src: bin/glcreate
    dest: "{{ local_bin_dir }}/glcreate"
    mode: "0755"
  when: tty_glab_enabled | bool

- name: Install glcreate only when GitLab tooling is enabled
  ansible.builtin.file:
    path: "{{ local_bin_dir }}/glcreate"
    state: absent
  when: not tty_glab_enabled | bool

- name: Install Newsboat URL list
  # TODO: Install the sanitized public newsboat config once its private feed
  # credentials and service-specific values are split into a downstream layer.
  ansible.builtin.copy:
    src: newsboat-urls
    dest: "{{ xdg_config_home }}/newsboat/urls"
    mode: "0644"
  when: tty_newsboat_enabled | bool

- name: Install gh configuration
  ansible.builtin.copy:
    src: gh-config.yml
    dest: "{{ xdg_config_home }}/gh/config.yml"
    mode: "0644"
  when: tty_gh_enabled | bool

- name: Install glab aliases
  ansible.builtin.copy:
    src: glab-aliases.yml
    dest: "{{ xdg_config_home }}/glab-cli/aliases.yml"
    mode: "0644"
  when: tty_glab_enabled | bool

- name: Install glab configuration skeleton
  ansible.builtin.template:
    src: glab-config.yml.j2
    dest: "{{ xdg_config_home }}/glab-cli/config.yml"
    mode: "0644"
  when: tty_glab_enabled | bool

- name: Install neofetch configuration
  ansible.builtin.copy:
    src: neofetch/config.conf
    dest: "{{ xdg_config_home }}/neofetch/config.conf"
    mode: "0644"
  when: tty_neofetch_enabled | bool

- name: Ensure TPM is installed
  ansible.builtin.debug:
    msg: "TPM is installed via git. TODO: validate the proper non-interactive bootstrap path from TPM docs before enabling automatic plugin installation."
  changed_when: false

- name: Bootstrap tmux plugins
  ansible.builtin.debug:
    msg: "TODO: Bootstrap tmux plugins non-interactively once the TPM command-line flow is validated. For now, use prefix + I inside tmux."
  changed_when: false
  when: tty_tmux_bootstrap_enabled | bool

unbind r
unbind t
bind r source-file ~/.tmux.conf
bind-key r source-file ~/.tmux.conf

# Pywal color settings
run-shell "tmux set-environment -g color0  $(jq -r '.colors.color0'  ~/.cache/wal/colors.json)"
run-shell "tmux set-environment -g color1  $(jq -r '.colors.color1'  ~/.cache/wal/colors.json)"
run-shell "tmux set-environment -g color2  $(jq -r '.colors.color2'  ~/.cache/wal/colors.json)"
run-shell "tmux set-environment -g color3  $(jq -r '.colors.color3'  ~/.cache/wal/colors.json)"
run-shell "tmux set-environment -g color4  $(jq -r '.colors.color4'  ~/.cache/wal/colors.json)"
run-shell "tmux set-environment -g color5  $(jq -r '.colors.color5'  ~/.cache/wal/colors.json)"
run-shell "tmux set-environment -g color6  $(jq -r '.colors.color6'  ~/.cache/wal/colors.json)"
run-shell "tmux set-environment -g color7  $(jq -r '.colors.color7'  ~/.cache/wal/colors.json)"
run-shell "tmux set-environment -g color8  $(jq -r '.colors.color8'  ~/.cache/wal/colors.json)"
run-shell "tmux set-environment -g color9  $(jq -r '.colors.color9'  ~/.cache/wal/colors.json)"
run-shell "tmux set-environment -g color10 $(jq -r '.colors.color10' ~/.cache/wal/colors.json)"
run-shell "tmux set-environment -g color11 $(jq -r '.colors.color11' ~/.cache/wal/colors.json)"
run-shell "tmux set-environment -g color12 $(jq -r '.colors.color12' ~/.cache/wal/colors.json)"
run-shell "tmux set-environment -g color13 $(jq -r '.colors.color13' ~/.cache/wal/colors.json)"
run-shell "tmux set-environment -g color14 $(jq -r '.colors.color14' ~/.cache/wal/colors.json)"
run-shell "tmux set-environment -g color15 $(jq -r '.colors.color15' ~/.cache/wal/colors.json)"

# Basic settings
unbind C-b
set-option -g prefix `
bind ` send-prefix
set -g base-index 1
set -g pane-base-index 1
set -g mode-keys vi
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
bind-key -n M-` last-window

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'YlanAllouche/tmux-task-monitor'
set -g @plugin 'tmux-plugins/tmux-yank'
# set -g @plugin 'fcsonline/tmux-thumbs'
# set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g set-clipboard on
bind-key f run-shell "tmux display-popup -w 90% -h 80% -d \$(tmux show-window-options -t '#{session_name}:#{window_index}' @worktree_path | cut -d' ' -f2) -E ranger"
bind-key p display-popup -w 90% -h 80% -E ~/.local/bin/tmux-sessionizer
bind-key P display-popup -w 90% -h 80% -E ~/.local/bin/init-selector

# --------------

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

set -g @fzf-url-bind 'X'
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'

if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

# bind-key -n 'C-Space' if-shell "$is_vim" 'send-keys C-Space' 'select-pane -t:.+'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l
# bind-key -T copy-mode-vi 'C-Space' select-pane -t:.+

# -------------

# Copy mode vi bindings (commented out duplicate bindings)
# bind-key -T copy-mode-vi 'C-h' select-pane -L
# bind-key -T copy-mode-vi 'C-j' select-pane -D
# bind-key -T copy-mode-vi 'C-k' select-pane -U
# bind-key -T copy-mode-vi 'C-l' select-pane -R

# Yank setup
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Mouse
set -g mouse on

# Terminal settings - consolidated
set -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",screen-256color:Tc"
# set -g default-terminal "tmux-256color" # Commented out duplicate setting

# Status bar configuration - consolidated
set-option -g status-interval 5
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
# set -g status-position top

# Status bar styling - consolidated with Pywal colors
set -g status-style "bg=#{color0},fg=#{color7}"
set -g status-left-length 50
set -g status-right-length 75
set -g status-left "#[fg=#{color0},bg=#{color6},bold]  #S #[ fg=#{color6},bg=#{color0}]"
setw -g window-status-current-format "#[fg=#{color0},bg=#{color4}] 󰕲  #I  #W #[fg=#{color4},bg=#{color0}]"
setw -g window-status-format " #I #W "
# Original status-right lines commented out
# set -g status-right "#{prefix_highlight}#[fg=#{color6},bg=#{color5}]#[fg=#{color0},bg=#{color3}] %H:%M "
# set -g status-right "#[fg=#{color5},bg=#{color0}]#[fg=#{color0},bg=#{color5}] #{pane_current_path} "
set -g status-right '#(gitmux "#{pane_current_path}")'

# Simple status right with Pywal colors and time
# set -g status-right "#[fg=#{color5},bg=#{color0}]#[fg=#{color0},bg=#{color5}] %H:%M "

# Pane styling - consolidated
set -g pane-border-style "fg=#{color8}"
set -g pane-active-border-style "fg=#{color6}"
set -g window-style 'fg=default,bg=default'
set -g window-active-style 'fg=default,bg=default'
set -g pane-border-lines simple

# Pane resizing
bind > swap-pane -D       # swap current pane with the next one
bind < swap-pane -U       # swap current pane with the previous one
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

bind-key -n M-1 run-shell "~/.local/bin/tmux-session-switch.sh 1"
bind-key -n M-2 run-shell "~/.local/bin/tmux-session-switch.sh 2" 
bind-key -n M-3 run-shell "~/.local/bin/tmux-session-switch.sh 3"
bind-key -n M-4 run-shell "~/.local/bin/tmux-session-switch.sh 4"
bind-key -n M-5 run-shell "~/.local/bin/tmux-session-switch.sh 5"

bind -n M-l send-keys C-l

# Switch to last session (backtick + space)
bind-key Space switch-client -l

bind-key b display-popup -E -w 80% -h 60% -d '#{pane_current_path}' "~/.local/bin/git-branch-switcher"
bind-key B display-popup -E -w 80% -h 60% -d '#{pane_current_path}' "~/.local/bin/git-branch-switcher --delete"

# bind-key t run-shell 'tmux display-popup -E -w 80% -h 40% -d "#{pane_current_path}" "~/.local/bin/tmux_monitor.py \"#{session_name}\" -w \"#{window_name}\""'




set -gq allow-passthrough on
set -g visual-activity off
# -----
bind-key '%' split-window -h -c "#{@worktree_path}"
bind-key '"' split-window -v -c "#{@worktree_path}"
bind-key g run-shell "tmux display-popup -w 90% -h 80% -E \"cd \$(tmux show-window-options -t '#{session_name}:#{window_index}' @worktree_path | cut -d' ' -f2) && lazygit\""

# F/G: ranger/lazygit in session's initial cwd (session-level, not window-level)
bind-key F run-shell "tmux display-popup -w 90% -h 80% -d '#{session_path}' -E ranger"
bind-key G run-shell "tmux display-popup -w 90% -h 80% -d '#{session_path}' -E lazygit"

bind-key q run-shell "tmux display-popup -w 90% -h 80%  -E ~/.local/bin/dv -s ~/share/_tmp/personal-calendar.json ~/share/_tmp/progress.json ~/share/_tmp/focus-notes.json ~/share/_tmp/focus-tasks.json ~/share/_tmp/focus.json ~/share/_tmp/waiting.json"
bind-key w run-shell "tmux display-popup -w 90% -h 80%  -E ~/.local/bin/dv -s ~/share/_tmp/current-videos.json ~/share/_tmp/initiatives.json ~/share/_tmp/current-tasks.json  ~/share/_tmp/current-projects.json ~/share/_tmp/current-wonders.json ~/share/_tmp/current-images.json"
bind-key e run-shell "tmux display-popup -w 90% -h 80%  -E ~/.local/bin/dv -s ~/share/_tmp/recent_achievements.json ~/share/_tmp/recent.json ~/share/_tmp/recent-inbox.json ~/share/_tmp/personal-tasks.json ~/share/_tmp/inbox-videos.json ~/share/_tmp/recent-notes.json ~/share/_tmp/starred-videos.json"
bind-key s run-shell "tmux display-popup -w 90% -h 80% -d \$(tmux show-window-options -t '#{session_name}:#{window_index}' @worktree_path | cut -d' ' -f2) -E zsh"

# -----
set -g default-terminal "tmux-256color"
# FIX: what is this about?
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
# -----
set -g pane-border-lines single
run '~/.tmux/plugins/tpm/tpm'
